name: Pioneer OS Forge
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm gcc-multilib qemu-system-x86

      - name: Forge Binary
        run: make

      - name: Verify Sovereign Binary
        run: |
          if [ -f BOOTX64.EFI ]; then
            echo "Sovereign EFI exists. Size: $(stat -c%s BOOTX64.EFI) bytes"
          else
            echo "Forge failed!" && exit 1
          fi

      - name: Headless Test (5 Seconds)
        run: |
          # Runs QEMU for 5s to ensure the kernel doesn't immediate panic
          timeout 5s qemu-system-i386 -drive format=raw,file=pioneer_os.bin,if=ide -display none || [ $? -eq 124 ]

      - name: Upload Sovereign Binary
        uses: actions/upload-artifact@v4
        with:
          name: pioneer-os-image        # The name of the ZIP you will download
          path: pioneer_os.bin          # The exact file name from your Makefile
          if-no-files-found: error      # Stop the build if the file is missing 
          
